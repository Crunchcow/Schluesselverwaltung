{% extends 'base.html' %}
{% block title %}Person bearbeiten{% endblock %}
{% block nav_manage %}active{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="sv-card">
            <h5 class="fw-bold mb-4">✏️ Person bearbeiten</h5>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ person.name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Funktion</label>
                    <input type="text" name="role" class="form-control" value="{{ person.role }}"
                           placeholder="z.B. Hausmeister, Reinigungskraft">
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Telefon</label>
                        <input type="tel" name="phone" class="form-control" value="{{ person.phone }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">E-Mail</label>
                        <input type="email" name="email" class="form-control" value="{{ person.email }}">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Bemerkungen</label>
                    <textarea name="notes" class="form-control" rows="2">{{ person.notes }}</textarea>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="is_active" class="form-check-input" id="isActive"
                           {% if person.is_active %}checked{% endif %}>
                    <label class="form-check-label fw-bold" for="isActive">Aktiv (erscheint bei Schlüsselvergabe)</label>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-red">Speichern</button>
                    <a href="{% url 'manage' %}" class="btn btn-outline-secondary">Abbrechen</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
