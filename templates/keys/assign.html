{% extends 'base.html' %}
{% block title %}Schlüssel vergeben{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<div class="sv-card">
    <h4 class="fw-bold mb-1">🔑 Schlüssel ausgeben</h4>
    <p class="text-muted mb-4">
        <strong>{{ key.key_type.name }}</strong> – {{ key.number }}
    </p>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-semibold">Name des Inhabers <span class="text-danger">*</span></label>
            <input type="text" name="holder_name" class="form-control" required
                   placeholder="Vor- und Nachname">
        </div>

        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label fw-semibold">E-Mail</label>
                <input type="email" name="holder_email" class="form-control"
                       placeholder="optional">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Telefon</label>
                <input type="tel" name="holder_phone" class="form-control"
                       placeholder="optional">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Ausgabedatum <span class="text-danger">*</span></label>
            <input type="date" name="issued_date" class="form-control"
                   value="{{ today }}" required>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Bemerkungen</label>
            <textarea name="notes" class="form-control" rows="2"
                      placeholder="optional"></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-red">✅ Ausgabe bestätigen</button>
            <a href="/" class="btn btn-outline-secondary">Abbrechen</a>
        </div>
        <p class="text-muted small mt-2">* Pflichtangabe</p>
    </form>
</div>
</div>
</div>
{% endblock %}
