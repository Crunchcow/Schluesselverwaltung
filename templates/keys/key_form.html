{% extends 'base.html' %}
{% block title %}Schlüssel bearbeiten{% endblock %}
{% block nav_manage %}active{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="sv-card">
            <h5 class="fw-bold mb-4">✏️ Schlüssel bearbeiten</h5>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Schlüsseltyp *</label>
                    <select name="key_type" class="form-select" required>
                        {% for kt in key_types %}
                        <option value="{{ kt.pk }}" {% if kt.pk == key.key_type_id %}selected{% endif %}>
                            {{ kt.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Bezeichnung / Nummer *</label>
                    <input type="text" name="number" class="form-control" value="{{ key.number }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Bemerkungen</label>
                    <textarea name="notes" class="form-control" rows="2">{{ key.notes }}</textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-red">Speichern</button>
                    <a href="{% url 'manage' %}" class="btn btn-outline-secondary">Abbrechen</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
